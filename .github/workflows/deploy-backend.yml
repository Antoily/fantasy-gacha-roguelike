name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Only deploy when secrets are configured
    if: ${{ vars.VPS_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/fantasy-roguelike/backend
            git pull origin main
            npm ci --omit=dev
            npx prisma migrate deploy
            pm2 restart fantasy-roguelike-backend || pm2 start dist/index.js --name fantasy-roguelike-backend
